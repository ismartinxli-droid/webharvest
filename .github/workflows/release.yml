name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:    # manual trigger from GitHub UI

permissions:
  contents: write   # needed to create GitHub Release

jobs:
  build:
    name: Build .dmg (Apple Silicon)
    runs-on: macos-14   # Apple Silicon runner, arm64 only
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Build Python package + run smoke tests
        working-directory: PythonCore
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --quiet --upgrade pip
          pip install --quiet pytest httpx selectolax tldextract
          pip install --quiet -e .
          pytest tests/ -v

      - name: Build Swift app (release, arm64 only)
        run: |
          set -x
          which swift
          swift --version
          swift build -c release --arch arm64
          ls -la .build/arm64-apple-macosx/release/WebHarvest
          echo "BINARY=.build/arm64-apple-macosx/release/WebHarvest" >> $GITHUB_ENV

      - name: Assemble .app bundle
        run: |
          mkdir -p dist
          rm -rf dist/WebHarvest.app
          
          # create bundle skeleton
          mkdir -p dist/WebHarvest.app/Contents/MacOS
          mkdir -p dist/WebHarvest.app/Contents/Resources
          
          # copy binary
          cp "$BINARY" dist/WebHarvest.app/Contents/MacOS/WebHarvest

          # copy Info.plist
          cp SwiftApp/Resources/Info.plist dist/WebHarvest.app/Contents/Info.plist
          
          # PkgInfo
          printf 'APPL????' > dist/WebHarvest.app/Contents/PkgInfo

      - name: Embed Python runtime (python-build-standalone)
        run: |
          set -e
          PBS_VERSION="20231002"
          PBS_TAG="cpython-3.11.6+${PBS_VERSION}-aarch64-apple-darwin-install_only"
          PBS_URL="https://github.com/astral-sh/python-build-standalone/releases/download/${PBS_VERSION}/${PBS_TAG}.tar.gz"

          mkdir -p /tmp/pbs
          echo "Downloading PBS from $PBS_URL"
          curl -L --show-error --fail -o /tmp/pbs/python.tar.gz "$PBS_URL"
          ls -la /tmp/pbs/python.tar.gz

          echo "Extracting..."
          tar -xzf /tmp/pbs/python.tar.gz -C /tmp/pbs
          ls /tmp/pbs/
          ls /tmp/pbs/python/bin/ | head

          mkdir -p dist/WebHarvest.app/Contents/Resources/python
          cp -R /tmp/pbs/python/bin dist/WebHarvest.app/Contents/Resources/python/
          cp -R /tmp/pbs/python/lib dist/WebHarvest.app/Contents/Resources/python/

          PY="dist/WebHarvest.app/Contents/Resources/python/bin/python3"
          "$PY" --version
          "$PY" -m ensurepip --upgrade
          "$PY" -m pip install --quiet --target dist/WebHarvest.app/Contents/Resources/python/site-packages \
              httpx selectolax tldextract
          cp -R PythonCore/webharvest dist/WebHarvest.app/Contents/Resources/python/site-packages/

      - name: Strip quarantine (zero-friction self-use)
        run: |
          xattr -cr dist/WebHarvest.app

      - name: Package as .dmg
        run: |
          which create-dmg || brew install create-dmg
          
          DMG="dist/WebHarvest-${GITHUB_REF_NAME}-arm64.dmg"
          rm -f "$DMG"
          
          create-dmg \
            --volname "WebHarvest" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "WebHarvest.app" 175 190 \
            --hide-extension "WebHarvest.app" \
            --app-drop-link 425 190 \
            "$DMG" \
            "dist/" || true
          
          # fallback to hdiutil if create-dmg failed
          if [ ! -f "$DMG" ]; then
            hdiutil create -volname "WebHarvest" -srcfolder "dist/WebHarvest.app" \
                -ov -format UDZO "$DMG"
          fi
          xattr -cr "$DMG" 2>/dev/null || true
          
          ls -lh "$DMG"
          echo "DMG_PATH=$DMG" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebHarvest-arm64-dmg
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
          generate_release_notes: true
          draft: true
