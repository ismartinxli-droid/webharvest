name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-tests:
    name: Python tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        working-directory: PythonCore
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest httpx selectolax tldextract
      - name: Run tests
        working-directory: PythonCore
        run: pytest tests/ -v

  swift-build:
    name: Swift build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build (arm64)
        run: swift build -c release --arch arm64
