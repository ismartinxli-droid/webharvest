<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5046E5"/>
      <stop offset="1" stop-color="#3C3489"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E0EBFF"/>
    </linearGradient>
  </defs>

  <!-- rounded square background with subtle gloss -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="512" rx="225" fill="#FFFFFF" opacity="0.04"/>

  <!-- subtle inset border -->
  <rect x="40" y="40" width="944" height="944" rx="190" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="6"/>

  <!-- tray (the "destination") -->
  <rect x="240" y="640" width="544" height="120" rx="40" fill="none" stroke="url(#arrow)" stroke-width="48" stroke-linecap="round"/>
  <line x1="320" y1="700" x2="704" y2="700" stroke="url(#arrow)" stroke-width="48" stroke-linecap="round"/>

  <!-- download arrow shaft -->
  <rect x="464" y="240" width="96" height="320" rx="48" fill="url(#arrow)"/>

  <!-- arrow head (left half) -->
  <polygon points="368,440 512,584 512,440" fill="url(#arrow)"/>
  <!-- arrow head (right half) -->
  <polygon points="656,440 512,584 512,440" fill="url(#arrow)"/>

  <!-- small dot accent (top-left corner, the "fresh download" hint) -->
  <circle cx="280" cy="280" r="24" fill="#10B981"/>
</svg>
